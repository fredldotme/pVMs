    prime:
      # Remove cruft
      - -usr/share/qemu/qemu-nsis.bmp

  post:
    after: [ pvms ]
    build-snaps: [ mesa-2404, hybris-2404 ]
    build-packages:
      - execstack
    source: https://github.com/canonical/gpu-snap.git
    plugin: dump
    override-prime: |
      craftctl default
      $CRAFT_PART_SRC/bin/gpu-2404-cleanup mesa-2404
      $CRAFT_PART_SRC/bin/gpu-2404-cleanup hybris-2404
      rm -rf $CRAFT_PRIME/usr/share/{doc,man}
      cd $CRAFT_PRIME/usr
      for f in $(ls share/qemu/openbios-*); do
        execstack -c $f
      done
    prime:
      - bin/gpu-2404-wrapper
