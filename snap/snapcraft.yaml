      - libaio1t64
      - libbluetooth3
      - libboost-iostreams1.83.0
      - libboost-random1.83.0
      - libboost-thread1.83.0
      - libbrlapi0.8
      - libepoxy0
      - libflac12t64
      - libiscsi7
      - libjemalloc2
      - libnfs14
      - libnuma1
      - librados2
      - librbd1
      - libsdl2-2.0-0
      - libsdl2-image-2.0-0
      - libsndio7.0
      - libspice-server1
